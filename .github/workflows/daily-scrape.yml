name: Daily JobsDB data refresh

on:
  schedule:
    # 08:30 Hong Kong time (00:30 UTC) every day.
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-jobsdb-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install project dependencies
        run: uv sync --frozen

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Scrape JobsDB
        run: |
          uv run python -m scraper.main \
            --keywords "AI Engineer" "Data Engineer" "Quant Developer" \
            --pages 10 \
            --delay 0 \
            --headless true

      - name: Rebuild cleaned CSV files
        run: uv run hk-tech-job-market-dashboard process-jobsdb

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/jobsdb_job_listings.csv
          git add data/raw/jobsdb_search_snapshots.csv
          git add data/processed/jobsdb_listings_clean.csv
          git add data/processed/jobsdb_search_snapshots_clean.csv
          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "data: refresh JobsDB snapshot"
            git push
          fi
